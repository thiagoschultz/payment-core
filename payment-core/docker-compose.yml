version: '3.9'

services:

 api:

  build: ../src/Payment.Api

  ports:
   - "5000:80"

  depends_on:
   - sql
   - redis

 sql:

  image: mcr.microsoft.com/mssql/server

  environment:

   SA_PASSWORD: Password123!

   ACCEPT_EULA: "Y"

  ports:
   - "1433:1433"

 redis:

  image: redis

  ports:
   - "6379:6379"


 prometheus:

  image: prom/prometheus

  volumes:

   - ./prometheus.yml:/etc/prometheus/prometheus.yml

  ports:
   - "9090:9090"


 grafana:

  image: grafana/grafana

  ports:
   - "3000:3000"